<!DOCTYPE html>
<html>
<head>
  <title>Zeynox Studios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      color:white;
      height:100vh;

      background:
      radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 60%, #000 100%);

      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .container{
      max-width:800px;
      padding:40px;
    }

    h1{
      font-size:64px;
      letter-spacing:10px;
      margin-bottom:20px;

      text-shadow:
      0 0 10px rgba(255,255,255,0.15),
      0 0 30px rgba(255,255,255,0.05);
    }

    .tagline{
      font-size:20px;
      opacity:0.85;
      margin-bottom:8px;
    }

    .subtext{
      font-size:16px;
      opacity:0.6;
      margin-bottom:40px;
    }

    .links{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    a{
      padding:12px 22px;
      border:1px solid rgba(255,255,255,0.15);
      border-radius:6px;
      color:white;
      text-decoration:none;
      font-size:14px;
      transition:all 0.25s ease;
    }

    a:hover{
      background:white;
      color:black;
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(0,0,0,0.4);
    }

    footer{
      position:absolute;
      bottom:20px;
      width:100%;
      text-align:center;
      font-size:12px;
      opacity:0.4;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>ZEYNOX</h1>

    <p class="tagline">Independent game studio</p>
    <p class="subtext">Building worlds through games</p>

    <div class="links">

      <a href="https://instagram.com/zeynoxstudios" target="_blank">Instagram</a>

      <a href="https://twitter.com/zeynoxstudios" target="_blank">Twitter</a>

      <a href="https://www.youtube.com/@zeynoxstudios" target="_blank">YouTube</a>

    </div>

  </div>

  <footer>
    © 2026 Zeynox Studios
  </footer>

</body>

</html>
