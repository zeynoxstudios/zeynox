<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Zeynox Studios — Independent game studio building immersive worlds through games.">
  <link rel="icon" type="image/svg+xml" href="icon black.svg">
  <title>Zeynox Studios</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      min-height: 100vh;
      overflow: hidden;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 60%, #000 100%);
    }

    .container {
      position: relative;
      z-index: 2;
      width: min(90%, 800px);
      padding: 40px 24px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 18px;
    }

    .brand {
      font-size: clamp(56px, 10vw, 82px);
      letter-spacing: 10px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 18px;
      text-shadow:
        0 0 10px rgba(255,255,255,0.15),
        0 0 30px rgba(255,255,255,0.05);
    }

    .type {
      font-size: 15px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.72;
      margin-bottom: 24px;
    }

    .divider {
      width: 82px;
      height: 1px;
      margin: 0 auto 24px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(255,255,255,0.45),
        transparent
      );
    }

    .coming {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 34px;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .links a {
      padding: 12px 20px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      color: white;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1.5px;
      background: rgba(255,255,255,0.02);
      transition: all 0.25s ease;
      min-width: 118px;
    }

    .links a:hover {
      background: white;
      color: black;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .corner {
      position: absolute;
      width: 36px;
      height: 36px;
      border-color: rgba(255,255,255,0.16);
      z-index: 1;
      pointer-events: none;
    }

    .tl {
      top: 14px;
      left: 14px;
      border-top: 1px solid;
      border-left: 1px solid;
    }

    .tr {
      top: 14px;
      right: 14px;
      border-top: 1px solid;
      border-right: 1px solid;
    }

    .bl {
      bottom: 14px;
      left: 14px;
      border-bottom: 1px solid;
      border-left: 1px solid;
    }

    .br {
      bottom: 14px;
      right: 14px;
      border-bottom: 1px solid;
      border-right: 1px solid;
    }

    .dot {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 8px rgba(255,255,255,0.06);
      z-index: 1;
      pointer-events: none;
    }

    .d1 { top: 20%; left: 18%; }
    .d2 { top: 26%; right: 20%; }
    .d3 { bottom: 22%; left: 22%; }
    .d4 { bottom: 18%; right: 18%; }

    footer {
      position: absolute;
      bottom: 18px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.28;
      z-index: 2;
    }

    @media (max-width: 600px) {
      .container {
        padding: 36px 18px;
      }

      .brand {
        letter-spacing: 7px;
      }

      .type {
        font-size: 13px;
        letter-spacing: 2px;
      }

      .coming {
        font-size: 12px;
        letter-spacing: 3px;
      }

      .links a {
        min-width: 100px;
        padding: 11px 14px;
        font-size: 11px;
      }
	  
	  .links a:hover{
		background:white;
		color:black;
		transform:translateY(-2px);
		box-shadow:0 8px 25px rgba(0,0,0,0.5);
		}
    }
	
	.stars {
		position: fixed;
		inset: 0;
		pointer-events: none;
		overflow: hidden;
		z-index: 0;
	}

	.star {
		position: absolute;
		width: 2px;
		height: 2px;
		background: white;
		opacity: 0.25;
		border-radius: 50%;
		animation: drift linear infinite;
		}

	@keyframes drift {
		from {
			transform: translateY(0px);
		}
		to {
			transform: translateY(-120vh);
		}
	}
	
	#secretFooter {
  position: absolute;
  bottom: 18px;
  left: 0;
  width: 100%;
  text-align: center;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.28;
  z-index: 2;

  transition: opacity 0.2s ease, text-shadow 0.2s ease;
}

#secretFooter:hover {
  opacity: 0.36;
  text-shadow: 0 0 4px rgba(255,255,255,0.08);
}
	
	.ship {
  position: absolute;
  width: 26px;
  height: 26px;
  pointer-events: auto;
  cursor: crosshair;
  z-index: 10;

  transition:
    left 3.8s ease-in-out,
    top 3.8s ease-in-out,
    opacity 0.2s ease;
}

.ship-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-origin: center center;
  transition:
    transform 0.12s linear,
    filter 0.2s ease;
}

/* spaceship body */
.ship-inner::before {
  content: "";
  position: absolute;
  inset: 0;
  background: white;
  clip-path: polygon(50% 0%, 88% 72%, 50% 58%, 12% 72%);
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.18));
}

/* cockpit */
.ship-inner::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 42%;
  width: 6px;
  height: 6px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
}

.ship.destroying {
  opacity: 0;
}

.ship.destroying .ship-inner {
  transform: scale(1.3) !important;
}

.ship.destroying .ship-inner::before {
  background: #ff3b3b;
  filter: drop-shadow(0 0 10px rgba(255,59,59,0.6));
}
  </style>
</head>
<body>

	<div class="stars"></div>
	<div class="corner tl"></div>
	<div class="corner tr"></div>
	<div class="corner bl"></div>
	<div class="corner br"></div>

	<div class="dot d1"></div>
	<div class="dot d2"></div>
	<div class="dot d3"></div>
	<div class="dot d4"></div>

  <main class="container">
    <div class="eyebrow">Game Studio</div>

    <h1 class="brand">ZEYNOX</h1>
    <!-- Replace this h1 with your logo later -->

    <p class="type">Independent Game Studio</p>

    <div class="divider"></div>

    <p class="coming">Coming Soon</p>

    <div class="links">
      <a href="https://instagram.com/zeynoxstudios" target="_blank" rel="noopener">Instagram</a>
      <a href="https://twitter.com/zeynoxstudios" target="_blank" rel="noopener">Twitter</a>
      <a href="https://www.youtube.com/@zeynoxstudios" target="_blank" rel="noopener">YouTube</a>
    </div>
  </main>

  <footer id="secretFooter">© 2026 Zeynox Studios</footer>


<script>
const starContainer = document.querySelector(".stars");

for (let i = 0; i < 40; i++) {

  const star = document.createElement("div");
  star.className = "star";

  const size = Math.random() * 2 + 1;

  star.style.width = size + "px";
  star.style.height = size + "px";

  star.style.left = Math.random() * 100 + "vw";
  star.style.top = Math.random() * 100 + "vh";

  star.style.animationDuration = (Math.random() * 20 + 20) + "s";

  starContainer.appendChild(star);
}
</script>

<script>
	let footerClickCount = 0;
	let secretActive = false;
	let activeShips = [];

	const REQUIRED_CLICKS = 5;
	const SHIP_COUNT = 6;

	const footer = document.getElementById("secretFooter");

	const footerMessages = [
		"© 2026 Zeynox Studios",
		"© 2026 Zeynox Studios — hmm?",
		"© 2026 Zeynox Studios — interesting...",
		"© 2026 Zeynox Studios — keep going",
		"© 2026 Zeynox Studios — almost there"
	];

	footer.addEventListener("click", () => {

	if (secretActive) return;

	footerClickCount++;

	if (footerClickCount < footerMessages.length) {
		footer.textContent = footerMessages[footerClickCount];
	}

	if (footerClickCount >= REQUIRED_CLICKS) {
		activateSecretMode();
	}

	});

  function activateSecretMode() {
    secretActive = true;
    spawnShips(SHIP_COUNT);
  }

  function spawnShips(count) {
    for (let i = 0; i < count; i++) {
      createShip();
    }
  }

  function createShip() {
    const ship = document.createElement("div");
	ship.className = "ship";
	ship.innerHTML = '<div class="ship-inner"></div>';

    const startX = randomInRange(40, window.innerWidth - 40);
    const startY = randomInRange(40, window.innerHeight - 40);

    ship.style.left = startX + "px";
    ship.style.top = startY + "px";

    document.body.appendChild(ship);
    activeShips.push(ship);

    ship.addEventListener("click", () => destroyShip(ship), { once: true });

    requestAnimationFrame(() => {
      moveShip(ship);
    });
  }

  function moveShip(ship) {
    if (!document.body.contains(ship)) return;
    if (ship.classList.contains("destroying")) return;

    const currentX = parseFloat(ship.style.left) || 0;
    const currentY = parseFloat(ship.style.top) || 0;

    let targetX, targetY, dx, dy, distance;
    const minDistance = 140;

    do {
      targetX = randomInRange(30, window.innerWidth - 50);
      targetY = randomInRange(30, window.innerHeight - 50);

      dx = targetX - currentX;
      dy = targetY - currentY;
      distance = Math.hypot(dx, dy);
    } while (distance < minDistance);

    // Base spaceship points upward, so add 90deg
    const angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;

    // Use the already calculated distance
    const duration = clamp(distance / 90, 2.4, 5.5);

    ship.style.transition =
      `left ${duration}s ease-in-out, top ${duration}s ease-in-out, opacity 0.2s ease`;

    const inner = ship.querySelector(".ship-inner");
    inner.style.transform = `rotate(${angle}deg)`;

    ship.style.left = targetX + "px";
    ship.style.top = targetY + "px";

    const handleArrival = (e) => {
      if (e.propertyName !== "left") return;

      ship.removeEventListener("transitionend", handleArrival);

      if (!document.body.contains(ship)) return;
      if (ship.classList.contains("destroying")) return;

      setTimeout(() => {
        moveShip(ship);
      }, randomInRange(120, 500));
    };

    ship.addEventListener("transitionend", handleArrival);
  }

  function destroyShip(ship) {
    if (!document.body.contains(ship)) return;
    if (ship.classList.contains("destroying")) return;

    ship.classList.add("destroying");

    setTimeout(() => {
      ship.remove();
      activeShips = activeShips.filter(s => s !== ship);

      if (activeShips.length === 0) {
        resetSecretMode();
      }
    }, 180);
  }

	function resetSecretMode() {
		footerClickCount = 0;
		secretActive = false;
		footer.textContent = "© 2026 Zeynox Studios";
	}

  function randomInRange(min, max) {
    return Math.random() * (max - min) + min;
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  window.addEventListener("resize", () => {
    activeShips.forEach(ship => {
      if (!document.body.contains(ship)) return;

      const x = clamp(parseFloat(ship.style.left) || 0, 20, window.innerWidth - 40);
      const y = clamp(parseFloat(ship.style.top) || 0, 20, window.innerHeight - 40);

      ship.style.left = x + "px";
      ship.style.top = y + "px";
    });
  });
</script>

</body>
</html>
