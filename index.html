<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Zeynox Studios — Independent game studio building immersive worlds through games.">
  <link rel="icon" type="image/png" href="icon.png">
  <title>Zeynox Studios</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      min-height: 100vh;
      overflow: hidden;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 60%, #000 100%);
    }

    .container {
      position: relative;
      z-index: 2;
      width: min(90%, 800px);
      padding: 40px 24px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 18px;
    }

    .brand {
      font-size: clamp(56px, 10vw, 82px);
      letter-spacing: 10px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 18px;
      text-shadow:
        0 0 10px rgba(255,255,255,0.15),
        0 0 30px rgba(255,255,255,0.05);
    }

    .type {
      font-size: 15px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.72;
      margin-bottom: 24px;
    }

    .divider {
      width: 82px;
      height: 1px;
      margin: 0 auto 24px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(255,255,255,0.45),
        transparent
      );
    }

    .coming {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 34px;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .links a {
      padding: 12px 20px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      color: white;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1.5px;
      background: rgba(255,255,255,0.02);
      transition: all 0.25s ease;
      min-width: 118px;
    }

    .links a:hover {
      background: white;
      color: black;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .corner {
      position: absolute;
      width: 36px;
      height: 36px;
      border-color: rgba(255,255,255,0.16);
      z-index: 1;
      pointer-events: none;
    }

    .tl {
      top: 14px;
      left: 14px;
      border-top: 1px solid;
      border-left: 1px solid;
    }

    .tr {
      top: 14px;
      right: 14px;
      border-top: 1px solid;
      border-right: 1px solid;
    }

    .bl {
      bottom: 14px;
      left: 14px;
      border-bottom: 1px solid;
      border-left: 1px solid;
    }

    .br {
      bottom: 14px;
      right: 14px;
      border-bottom: 1px solid;
      border-right: 1px solid;
    }

    .dot {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 8px rgba(255,255,255,0.06);
      z-index: 1;
      pointer-events: none;
    }

    .d1 { top: 20%; left: 18%; }
    .d2 { top: 26%; right: 20%; }
    .d3 { bottom: 22%; left: 22%; }
    .d4 { bottom: 18%; right: 18%; }

    footer {
      position: absolute;
      bottom: 18px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.28;
      z-index: 2;
    }

    @media (max-width: 600px) {
      .container {
        padding: 36px 18px;
      }

      .brand {
        letter-spacing: 7px;
      }

      .type {
        font-size: 13px;
        letter-spacing: 2px;
      }

      .coming {
        font-size: 12px;
        letter-spacing: 3px;
      }

      .links a {
        min-width: 100px;
        padding: 11px 14px;
        font-size: 11px;
      }
	  
	  .links a:hover{
		background:white;
		color:black;
		transform:translateY(-2px);
		box-shadow:0 8px 25px rgba(0,0,0,0.5);
	}
    }
  </style>
</head>
<body>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="dot d1"></div>
  <div class="dot d2"></div>
  <div class="dot d3"></div>
  <div class="dot d4"></div>

  <main class="container">
    <div class="eyebrow">Game Studio</div>

    <h1 class="brand">ZEYNOX</h1>

    <p class="type">Independent Game Studio</p>

    <div class="divider"></div>

    <p class="coming">Coming Soon</p>

    <div class="links">
      <a href="https://instagram.com/zeynoxstudios" target="_blank" rel="noopener">Instagram</a>
      <a href="https://twitter.com/zeynoxstudios" target="_blank" rel="noopener">Twitter</a>
      <a href="https://www.youtube.com/@zeynoxstudios" target="_blank" rel="noopener">YouTube</a>
    </div>
  </main>

  <footer>© 2026 Zeynox Studios</footer>

</body>
</html>
